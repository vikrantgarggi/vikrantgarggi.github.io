name: "Ganpati Industries"
tagline: "Premium PET Packaging Solutions"
heroDescription: "Quality PET bottles and jars for edible oil packaging. Serving businesses with reliable, food-grade packaging solutions."
aboutText:
  - "We are a PET blow moulding manufacturing company based in Mansa (Punjab), specializing in high-quality PET bottles and jars."
  - "Our PET Bottle range is designed for edible oils, industrial liquid filling units and related applications, offering a wide selection of shapes and sizes ranging from 100 mL to 5 L."
  - "Our PET Jar range is ideal for dry fruits, pickles, ghee and other food packaging needs, available in 200 g, 500 g and 1 kg capacities."
  - "Every product is manufactured using premium, food-grade PET that complies with Indian quality and safety standards, ensuring durability, hygiene and reliability."
  - "We take pride in supplying businesses of all scales — from growing regional brands to large commercial enterprises— and remain committed to consistent quality, timely delivery and customer satisfaction."
